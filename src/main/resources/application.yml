server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_blog?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

management:
  health:
    redis:
      enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 开发调试时可打开 SQL 日志：log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ai-blog-jwt-secret-key-2026-must-be-long-enough-for-hs256
  expiration: 86400000

deepseek:
  # 通过环境变量 DEEPSEEK_API_KEY 配置，勿将真实密钥写入此文件
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-chat

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cache:
    article-list-ttl-minutes: 10
    hot-article-ttl-minutes: 30
    user-info-ttl-minutes: 60
