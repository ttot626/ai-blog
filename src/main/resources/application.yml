server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ai-blog-jwt-secret-key-2026-must-be-long-enough-for-hs256
  expiration: 86400000
