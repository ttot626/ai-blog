<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog - 本地博客系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
    <header class="header">
        <div class="header-inner">
            <a href="#/" class="logo">
                <span class="logo-icon">✦</span>
                <span>AI Blog</span>
            </a>
            <nav class="nav">
                <a href="#/" class="nav-link" data-route="/">首页</a>
                <a href="#/hot" class="nav-link" data-route="/hot">热门</a>
                <a href="#/write" class="nav-link nav-auth" data-route="/write">写文章</a>
                <a href="#/favorites" class="nav-link nav-auth" data-route="/favorites">收藏</a>
            </nav>
            <div class="header-actions">
                <button id="btn-login" class="btn btn-primary btn-sm">登录</button>
                <div id="user-menu" class="user-menu hidden">
                    <button class="user-trigger" id="user-trigger">
                        <span class="avatar" id="user-avatar">U</span>
                        <span id="user-name">用户</span>
                    </button>
                    <div class="dropdown" id="user-dropdown">
                        <a href="#/profile" id="link-profile">我的主页</a>
                        <button id="btn-logout">退出登录</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="main"></main>

    <footer class="footer">
        <p>AI Blog · Spring Boot 本地博客 · 运行在 localhost:8080</p>
    </footer>
</div>

<!-- 登录/注册弹窗 -->
<div id="auth-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
        <button class="modal-close" id="auth-close">&times;</button>
        <h2 id="auth-title">登录</h2>
        <div class="tabs">
            <button class="tab active" data-tab="login">登录</button>
            <button class="tab" data-tab="register">注册</button>
        </div>
        <form id="auth-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="auth-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="auth-password" placeholder="至少 6 位" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="auth-submit">登录</button>
        </form>
    </div>
</div>

<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
