spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:ai_blog_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  data:
    redis:
      host: localhost
      port: 6379

management:
  health:
    redis:
      enabled: false

jwt:
  secret: test-jwt-secret-key-for-unit-tests-only-32chars
  expiration: 86400000

deepseek:
  api-key: test-key-not-used-in-tests
  base-url: https://api.deepseek.com
  model: deepseek-chat
